name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/test_network_analysis.py tests/test_feedback_loops.py tests/test_graph_construction.py -v --tb=short

      - name: Run server integration tests
        run: pytest tests/test_server.py -v --tb=short

  test-diffusion-js:
    name: Node.js diffusion tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run diffusion.js tests
        run: node tests/test_diffusion_node.mjs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check platform/*.py tests/*.py --select E,F,W --ignore E501

  paper:
    name: JOSS Paper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build JOSS paper PDF
        uses: openjournals/paperdraft@v1
        with:
          journal: joss

      - name: Upload paper artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf
