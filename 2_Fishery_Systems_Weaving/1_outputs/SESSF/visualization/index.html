<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SESSF Systems Map Visualization</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="controls">
            <div class="filters">
                <h2>Filters</h2>
                <div class="filter-group">
                    <label for="category-filter">Variable Type:</label>
                    <select id="category-filter" class="filter">
                        <option value="all">All</option>
                        <option value="ecological">Ecological</option>
                        <option value="economic">Economic</option>
                        <option value="management">Management</option>
                        <option value="social">Social</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="strength-filter">Relationship Strength:</label>
                    <select id="strength-filter" class="filter">
                        <option value="all">All</option>
                        <option value="strong">Strong</option>
                        <option value="moderate">Moderate</option>
                        <option value="weak">Weak</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="evidence-filter">Evidence Level:</label>
                    <select id="evidence-filter" class="filter">
                        <option value="all">All</option>
                        <option value="strong">Strong</option>
                        <option value="moderate">Moderate</option>
                        <option value="limited">Limited</option>
                    </select>
                </div>
            </div>
            <div class="view-options">
                <h2>View Options</h2>
                <button id="reset-view">Reset View</button>
                <button id="toggle-subsystems">Toggle Subsystems</button>
            </div>
        </div>
        <div id="visualization"></div>
        <div id="info-panel">
            <h2>Information Panel</h2>
            <p>Click on a node to see detailed information.</p>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="visualization.js"></script>
</body>
</html>
